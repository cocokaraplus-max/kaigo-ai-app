<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>パスワードリセット - TASUKARU</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8f0fe, #f3e5f5);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white; border-radius: 20px;
            padding: 32px 24px; max-width: 400px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo img { width: 80px; }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: #1a73e8; margin-top: 8px; }
        .card-title { text-align: center; font-size: 1.1rem; font-weight: 700; color: #202124; margin-bottom: 6px; }
        .card-desc { text-align: center; font-size: 0.83rem; color: #5f6368; margin-bottom: 24px; line-height: 1.6; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; font-weight: 600; color: #5f6368; margin-bottom: 6px; }
        .material-symbols-outlined { font-size: 18px; vertical-align: middle; }
        .form-control { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #E0E0E0; font-size: 1rem; color: #202124; -webkit-appearance: none; transition: border-color 0.15s; }
        .form-control:focus { outline: none; border-color: #1a73e8; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #1a73e8; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:active { opacity: 0.9; }
        .alert { padding: 12px 14px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
        .alert-error { background: #fce8e6; color: #c5221f; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { font-size: 0.82rem; color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="TASUKARU" onerror="this.style.display='none'">
            <div class="logo-text">TASUKARU</div>
        </div>

        {% if success %}
        <div class="alert alert-success">
            <span class="material-symbols-outlined">check_circle</span>
            メールを送信しました。メールのリンクからパスワードを再設定してください。
        </div>
        {% else %}
        <div class="card-title">パスワードをリセット</div>
        <div class="card-desc">登録済みのメールアドレスを入力してください。<br>パスワード再設定リンクをお送りします。</div>

        {% if error %}
        <div class="alert alert-error">
            <span class="material-symbols-outlined">error</span>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">mail</span>
                    メールアドレス
                </label>
                <input type="email" name="email" class="form-control" placeholder="例：hanako@example.com" required>
            </div>
            <button type="submit" class="btn">
                <span class="material-symbols-outlined">send</span>
                リセットメールを送信
            </button>
        </form>
        {% endif %}

        <div class="back-link">
            <a href="/login">← ログイン画面に戻る</a>
        </div>
    </div>
</body>
</html>
