<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スタッフ登録 - TASUKARU</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #e8f0fe, #f3e5f5);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 32px 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img { width: 80px; }
        .logo-text {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a73e8;
            margin-top: 8px;
        }
        .card-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 700;
            color: #202124;
            margin-bottom: 8px;
        }
        .facility-badge {
            text-align: center;
            font-size: 0.85rem;
            color: #5f6368;
            background: #f8f9fa;
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.82rem; font-weight: 600; color: #5f6368;
            margin-bottom: 6px;
        }
        .material-symbols-outlined { font-size: 18px; vertical-align: middle; }
        .form-control {
            width: 100%; padding: 12px 14px;
            border-radius: 10px; border: 1.5px solid #E0E0E0;
            font-size: 1rem; color: #202124;
            -webkit-appearance: none; transition: border-color 0.15s;
        }
        .form-control:focus { outline: none; border-color: #1a73e8; }
        .btn {
            width: 100%; padding: 16px;
            border-radius: 12px; border: none;
            background: #1a73e8; color: white;
            font-size: 1rem; font-weight: 700;
            cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { opacity: 0.9; }
        .alert {
            padding: 12px 14px; border-radius: 10px;
            font-size: 0.88rem; margin-bottom: 16px;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .alert-error { background: #fce8e6; color: #c5221f; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .expired-msg {
            text-align: center; color: #ea4335;
            font-size: 0.9rem; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="TASUKARU" onerror="this.style.display='none'">
            <div class="logo-text">TASUKARU</div>
        </div>

        {% if expired %}
        <div class="expired-msg">
            <span class="material-symbols-outlined" style="font-size:48px;color:#ea4335;display:block;margin-bottom:12px;">link_off</span>
            この招待リンクは無効です。<br>
            管理者に新しいQRコードを<br>発行してもらってください。
        </div>
        {% else %}
        <div class="card-title">スタッフ登録</div>
        <div class="facility-badge">
            <span class="material-symbols-outlined" style="font-size:14px;">business</span>
            {{ facility_name }}
        </div>

        {% if error %}
        <div class="alert alert-error">
            <span class="material-symbols-outlined">error</span>
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="alert alert-success">
            <span class="material-symbols-outlined">check_circle</span>
            登録完了！ログイン画面からサインインしてください。
        </div>
        <a href="/login" style="display:block;text-align:center;color:#1a73e8;font-weight:700;margin-top:16px;text-decoration:none;">
            ログイン画面へ →
        </a>
        {% else %}
        <form method="POST">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">person</span>
                    お名前
                </label>
                <input type="text" name="staff_name" class="form-control"
                    placeholder="例：田中 花子" required
                    value="{{ request.form.get('staff_name', '') }}">
            </div>
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">lock</span>
                    パスワード
                </label>
                <input type="password" name="password" class="form-control"
                    placeholder="4文字以上" required>
            </div>
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">lock_reset</span>
                    パスワード確認
                </label>
                <input type="password" name="password2" class="form-control"
                    placeholder="もう一度入力" required>
            </div>
            <button type="submit" class="btn">
                <span class="material-symbols-outlined">how_to_reg</span>
                登録する
            </button>
        </form>
        {% endif %}
        {% endif %}
    </div>
</body>
</html>
