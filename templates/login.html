{% extends "base.html" %}
{% block title %}ログイン - TASUKARU{% endblock %}
{% block bottom_nav %}{% endblock %}

{% block content %}
<div class="logo-area">
    <img src="/static/logo.png" alt="TASUKARU" onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
    <div id="logo-text" class="logo-text" style="display:none">TASUKARU</div>
</div>

<h2 style="text-align:center; font-size:1.1rem; font-weight:700; color:#202124; margin-bottom:1.5rem;">ログイン</h2>

{% if error %}
<div class="alert alert-error">
    <span class="material-symbols-outlined">error</span>
    {{ error }}
</div>
{% endif %}

<form method="POST" action="/login">
    <div class="form-group">
        <label class="form-label">
            <span class="material-symbols-outlined">business</span>
            施設コード
        </label>
        <input type="text" name="f_code" class="form-control" value="{{ saved_f_code }}" autocomplete="off" autocapitalize="none">
    </div>

    <div class="form-group">
        <label class="form-label">
            <span class="material-symbols-outlined">lock</span>
            パスワード
        </label>
        <div style="position:relative;">
            <input type="password" name="password" class="form-control" id="login-password" style="padding-right:44px;">
            <span onclick="togglePw('login-password','login-eye')"
                style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#80868b;user-select:none;">
                <span class="material-symbols-outlined" id="login-eye" style="font-size:20px;">visibility</span>
            </span>
        </div>
    </div>

    <div class="form-group">
        <label class="form-label">
            <span class="material-symbols-outlined">person</span>
            お名前
            <span style="font-size:0.72rem;color:#80868b;font-weight:400;margin-left:4px;">（任意・管理者パスワードでのログイン時に使用）</span>
        </label>
        <input type="text" name="login_name" class="form-control"
            placeholder="例：山田 太郎"
            value="{{ saved_login_name or '' }}"
            autocomplete="off">
    </div>

    <button type="submit" class="btn btn-primary" style="margin-top:0.5rem;">
        <span class="material-symbols-outlined">login</span>
        ログイン
    </button>
</form>

<div style="text-align:center; margin-top:1rem;">
    <a href="/reset_password" style="font-size:0.82rem; color:#80868b; text-decoration:none;">
        パスワードを忘れた方はこちら
    </a>
</div>

<div style="text-align:center; margin-top:1rem;">
    <a href="/register" style="font-size:0.82rem; color:#1a73e8; text-decoration:none;">施設の新規登録はこちら</a>
</div>
{% endblock %}

{% block extra_script %}
<script>
function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility';
    }
}
</script>
{% endblock %}
