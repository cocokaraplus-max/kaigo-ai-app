<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA設定 -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TASUKARU">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1a73e8">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.jpg">
    <title>{% block title %}TASUKARU{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            background-color: #F5F5F5;
            color: #202124;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .page-wrapper {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            background: #FFFFFF;
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            border-top: 3px solid #1a73e8;
            padding: 1.5rem 1.2rem 1.5rem;
        }

        /* Material Symbols */
        .material-symbols-outlined {
            font-size: 20px;
            vertical-align: middle;
            line-height: 1;
        }

        /* ロゴ */
        .logo-area {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-area img { width: 200px; max-width: 80%; }
        .logo-area .logo-text {
            font-size: 1.6rem; font-weight: 800;
            color: #1a73e8; letter-spacing: -0.5px;
        }

        /* ページタイトル */
        .page-title {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem; font-weight: 700; color: #202124;
            margin-bottom: 1.2rem; padding-bottom: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .page-title .material-symbols-outlined { font-size: 22px; color: #1a73e8; }

        /* ボタン共通 */
        .btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; width: 100%; padding: 16px;
            border-radius: 12px; border: 1.5px solid #E0E0E0;
            background: #FFFFFF; color: #202124;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.98); }
        .btn .material-symbols-outlined { font-size: 20px; }
        .btn-primary { background: #1a73e8; color: #FFFFFF; border: none; }
        .btn-primary .material-symbols-outlined { color: #FFFFFF; }
        .btn-danger { background: #ea4335; color: #FFFFFF; border: none; }
        .btn-sm { padding: 10px 14px; font-size: 0.85rem; border-radius: 8px; width: auto; }

        /* フォーム */
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: flex; align-items: center; gap: 5px;
            font-size: 0.82rem; font-weight: 600; color: #5f6368; margin-bottom: 6px;
        }
        .form-label .material-symbols-outlined { font-size: 16px; color: #1a73e8; }
        .form-control {
            width: 100%; padding: 12px 14px; border-radius: 10px;
            border: 1.5px solid #E0E0E0; font-size: 1rem;
            color: #202124; background: #FFFFFF; -webkit-appearance: none;
            transition: border-color 0.15s;
        }
        .form-control:focus { outline: none; border-color: #1a73e8; }
        textarea.form-control { resize: vertical; min-height: 160px; line-height: 1.6; }

        /* アラート */
        .alert {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 12px 14px; border-radius: 10px;
            font-size: 0.88rem; margin-bottom: 1rem;
        }
        .alert .material-symbols-outlined { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .alert-error { background: #fce8e6; color: #c5221f; }
        .alert-warning { background: #fef7e0; color: #b06000; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .alert-info { background: #e8f0fe; color: #1557b0; }

        /* 区切り線 */
        .divider { border: none; border-top: 1px solid #f0f0f0; margin: 1.2rem 0; }

        /* TOPへ戻るボタン（ボトムナビがあるので非表示） */
        .back-btn { display: none; }

        /* ボトムナビ */
        .bottom-nav {
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            /* iPhoneのジェスチャーエリアと被らないよう下に余白 */
            padding: 6px 4px;
            padding-bottom: max(80px, calc(env(safe-area-inset-bottom) + 56px));
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
            gap: 2px;
            flex-shrink: 0;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            /* エッジスワイプをナビに渡さない */
            touch-action: pan-x;
            overscroll-behavior-x: contain;
        }
        .bottom-nav::-webkit-scrollbar { display: none; }

        .bottom-nav-item {
            display: flex; flex-direction: column;
            align-items: center; gap: 2px;
            text-decoration: none; color: #80868b;
            font-size: 0.6rem; font-weight: 600;
            padding: 4px 10px; border-radius: 10px;
            transition: color 0.15s, background 0.15s;
            cursor: pointer; background: none; border: none;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap; flex-shrink: 0; min-width: 52px;
        }
        .bottom-nav-item .material-symbols-outlined { font-size: 22px; }
        .bottom-nav-item.active { color: #1a73e8; }
        .bottom-nav-item.active .material-symbols-outlined {
            background: #e8f0fe; border-radius: 8px; padding: 2px 8px;
        }
        .bottom-nav-item:active { background: #f0f4ff; }
        .bottom-nav-item.logout-item { color: #ea4335; }
        .bottom-nav-item.logout-item:active { background: #fce8e6; }

        /* フラッシュメッセージ */
        .flash-messages { margin-bottom: 1rem; }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>

    {% block bottom_nav %}
    <nav class="bottom-nav">
        <a href="/top" class="bottom-nav-item {% block nav_top %}{% endblock %}" onclick="spaNav(event,'/top')">
            <span class="material-symbols-outlined">home</span>
            TOP
        </a>
        <a href="/input" class="bottom-nav-item {% block nav_input %}{% endblock %}" onclick="spaNav(event,'/input')">
            <span class="material-symbols-outlined">edit_note</span>
            記録入力
        </a>
        <a href="/daily_view" class="bottom-nav-item {% block nav_daily %}{% endblock %}" onclick="spaNav(event,'/daily_view')">
            <span class="material-symbols-outlined">calendar_month</span>
            ケース記録
        </a>
        <a href="/history" class="bottom-nav-item {% block nav_history %}{% endblock %}" onclick="spaNav(event,'/history')">
            <span class="material-symbols-outlined">monitoring</span>
            モニタリング
        </a>
        <a href="/chat" class="bottom-nav-item {% block nav_chat %}{% endblock %}" onclick="spaNav(event,'/chat')">
            <span class="material-symbols-outlined">forum</span>
            トーク
        </a>
        <a href="/birthday" class="bottom-nav-item {% block nav_birthday %}{% endblock %}" onclick="spaNav(event,'/birthday')">
            <span class="material-symbols-outlined">cake</span>
            誕生日
        </a>
        <a href="/numerology" class="bottom-nav-item {% block nav_numerology %}{% endblock %}" onclick="spaNav(event,'/numerology')">
            <span class="material-symbols-outlined">auto_awesome</span>
            数秘
        </a>
        <a href="/admin" class="bottom-nav-item {% block nav_admin %}{% endblock %}">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            管理者MENU
        </a>
        <form method="POST" action="/logout" style="display:contents;">
            <button type="submit" class="bottom-nav-item logout-item">
                <span class="material-symbols-outlined">logout</span>
                ログアウト
            </button>
        </form>
    </nav>
    {% endblock %}

    {% block extra_script %}{% endblock %}

<script>
// ========== SPAルーター ==========

// onclick属性から直接呼ばれる関数（iPhoneでも確実に動く）
function spaNav(event, url) {
    // admin・history・numerologyは通常遷移（JSが複雑なためSPA非対応）
    // Jinja2タグを含むページは通常遷移（SPA非対応）
    if (['/admin', '/history', '/numerology', '/birthday', '/input', '/daily_view'].includes(url)) {
        return;
    }
    event.preventDefault();
    navigateTo(url);
}

async function navigateTo(url, pushState = true) {
    console.log('[SPA] navigateTo:', url);
    const wrapper = document.querySelector('.page-wrapper');
    if (!wrapper) {
        console.log('[SPA] page-wrapper not found, fallback');
        window.location.href = url;
        return;
    }
    wrapper.style.opacity = '0.6';

    try {
        const fetchUrl = url + (url.includes('?') ? '&' : '?') + 'partial=1';
        console.log('[SPA] fetching:', fetchUrl);
        const res = await fetch(fetchUrl, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });

        if (!res.ok) {
            console.log('[SPA] fetch failed, status:', res.status);
            throw new Error('fetch failed');
        }

        const data = await res.json();
        console.log('[SPA] got response, content length:', (data.content || '').length);

        if (data.redirect) {
            window.location.href = data.redirect;
            return;
        }

        // スタイル更新
        let styleEl = document.getElementById('spa-style');
        if (!styleEl) {
            styleEl = document.createElement('style');
            styleEl.id = 'spa-style';
            document.head.appendChild(styleEl);
        }
        styleEl.textContent = (data.style || '').replace(/<\/?style>/g, '');

        // コンテンツ差し替え
        wrapper.innerHTML = data.content || '';
        wrapper.scrollTop = 0;

        // スクリプト実行 - 古いSPA注入スクリプトを全て削除してから追加
        document.querySelectorAll('.spa-injected-script').forEach(s => s.remove());
        if (data.script) {
            const scriptContent = (data.script || '').replace(/<\/?script[^>]*>/g, '');
            if (scriptContent.trim()) {
                const scriptEl = document.createElement('script');
                scriptEl.className = 'spa-injected-script';
                scriptEl.textContent = scriptContent;
                document.head.appendChild(scriptEl);
            }
        }

        if (pushState) {
            history.pushState({ url }, '', url);
        }

        updateNavActive(url);
        window.__SPA_NAVIGATED__ = true;
        console.log('[SPA] navigation complete:', url);

    } catch(e) {
        console.log('[SPA] error, fallback:', e);
        window.location.href = url;
    } finally {
        if (wrapper) wrapper.style.opacity = '1';
    }
}

function updateNavActive(url) {
    const basePath = url.split('?')[0];
    document.querySelectorAll('.bottom-nav-item').forEach(item => {
        item.classList.remove('active');
        const href = item.getAttribute('href');
        if (href && basePath === href) {
            item.classList.add('active');
        }
    });
}

// ナビリンクのクリックをSPAに変換（イベント委譲）
document.addEventListener('click', e => {
    const link = e.target.closest('.bottom-nav-item[href]');
    if (!link) return;
    const href = link.getAttribute('href');
    // adminは通常遷移
    if (href === '/admin') return;
    e.preventDefault();
    navigateTo(href);
});

// ブラウザの戻る/進むに対応
window.addEventListener('popstate', e => {
    if (e.state && e.state.url) {
        navigateTo(e.state.url, false);
    }
});

// 初期状態をhistoryに登録
window.addEventListener('load', () => {
    history.replaceState({ url: window.location.pathname }, '', window.location.pathname);
    updateNavActive(window.location.pathname);
});
</script>
</body>
</html>
