<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}TASUKARU{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            background-color: #F5F5F5;
            color: #202124;
            min-height: 100vh;
        }

        .page-wrapper {
            max-width: 480px;
            margin: 0 auto;
            background: #FFFFFF;
            min-height: 100vh;
            border-top: 3px solid #1a73e8;
            padding: 1.5rem 1.2rem 4rem;
        }

        /* Material Symbols */
        .material-symbols-outlined {
            font-size: 20px;
            vertical-align: middle;
            line-height: 1;
        }

        /* ロゴ */
        .logo-area {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo-area img {
            width: 200px;
            max-width: 80%;
        }
        .logo-area .logo-text {
            font-size: 1.6rem;
            font-weight: 800;
            color: #1a73e8;
            letter-spacing: -0.5px;
        }

        /* ページタイトル */
        .page-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #202124;
            margin-bottom: 1.2rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .page-title .material-symbols-outlined {
            font-size: 22px;
            color: #1a73e8;
        }

        /* ボタン共通 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1.5px solid #E0E0E0;
            background: #FFFFFF;
            color: #202124;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.98); }
        .btn .material-symbols-outlined { font-size: 20px; }

        .btn-primary {
            background: #1a73e8;
            color: #FFFFFF;
            border: none;
        }
        .btn-primary .material-symbols-outlined { color: #FFFFFF; }

        .btn-danger {
            background: #ea4335;
            color: #FFFFFF;
            border: none;
        }
        .btn-sm {
            padding: 10px 14px;
            font-size: 0.85rem;
            border-radius: 8px;
            width: auto;
        }

        /* フォーム */
        .form-group { margin-bottom: 1rem; }
        .form-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.82rem;
            font-weight: 600;
            color: #5f6368;
            margin-bottom: 6px;
        }
        .form-label .material-symbols-outlined { font-size: 16px; color: #1a73e8; }
        .form-control {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1.5px solid #E0E0E0;
            font-size: 1rem;
            color: #202124;
            background: #FFFFFF;
            -webkit-appearance: none;
            transition: border-color 0.15s;
        }
        .form-control:focus {
            outline: none;
            border-color: #1a73e8;
        }
        textarea.form-control { resize: vertical; min-height: 160px; line-height: 1.6; }

        /* アラート */
        .alert {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.88rem;
            margin-bottom: 1rem;
        }
        .alert .material-symbols-outlined { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
        .alert-error { background: #fce8e6; color: #c5221f; }
        .alert-warning { background: #fef7e0; color: #b06000; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .alert-info { background: #e8f0fe; color: #1557b0; }

        /* 区切り線 */
        .divider {
            border: none;
            border-top: 1px solid #f0f0f0;
            margin: 1.2rem 0;
        }

        /* TOPへ戻るボタン */
        .back-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1.5px solid #E0E0E0;
            background: #FFFFFF;
            color: #5f6368;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            text-decoration: none;
            transition: background 0.15s;
        }
        .back-btn .material-symbols-outlined { font-size: 18px; }
        .back-btn:active { background: #f5f5f5; }

        /* ボトムナビ */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #ffffff;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
            z-index: 500;
            box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
        }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            text-decoration: none;
            color: #80868b;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 16px;
            border-radius: 12px;
            transition: color 0.15s, background 0.15s;
            cursor: pointer;
            background: none;
            border: none;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav-item .material-symbols-outlined { font-size: 24px; }
        .bottom-nav-item.active { color: #1a73e8; }
        .bottom-nav-item:active { background: #f0f4ff; }

        /* ボトムナビの分、ページ下部に余白 */
        .page-wrapper { padding-bottom: 5rem !important; }

        /* フラッシュメッセージ */
        .flash-messages { margin-bottom: 1rem; }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- ボトムナビ（ログイン・登録画面以外で表示） -->
    {% block bottom_nav %}
    <nav class="bottom-nav">
        <a href="/top" class="bottom-nav-item {% block nav_top %}{% endblock %}">
            <span class="material-symbols-outlined">home</span>
            TOP
        </a>
        <a href="/input" class="bottom-nav-item {% block nav_input %}{% endblock %}">
            <span class="material-symbols-outlined">edit_note</span>
            記録入力
        </a>
        <a href="/daily_view" class="bottom-nav-item {% block nav_daily %}{% endblock %}">
            <span class="material-symbols-outlined">calendar_month</span>
            記録閲覧
        </a>
        <a href="/history" class="bottom-nav-item {% block nav_history %}{% endblock %}">
            <span class="material-symbols-outlined">monitoring</span>
            モニタリング
        </a>
        <a href="/admin" class="bottom-nav-item {% block nav_admin %}{% endblock %}">
            <span class="material-symbols-outlined">admin_panel_settings</span>
            管理者
        </a>
    </nav>
    {% endblock %}

    {% block extra_script %}{% endblock %}
</body>
</html>
