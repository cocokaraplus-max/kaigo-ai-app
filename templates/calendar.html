{% extends "base.html" %}
{% block title %}カレンダー - TASUKARU{% endblock %}
{% block nav_calendar %}active{% endblock %}

{% block extra_style %}
<style>
  .cal-page {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 12px 120px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 12px 4px 16px;
  }
  .cal-title { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid #dde1e6; background: #fff; color: #1a73e8;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: #f1f6ff; }
  .cal-nav .cal-today-btn {
    width: auto; padding: 0 14px; border-radius: 18px;
    font-size: 0.88rem; font-weight: 600;
  }
  .cal-month-label {
    font-size: 1.15rem; font-weight: 700; color: #1a1a1a;
    text-align: center; margin: 4px 0 12px;
  }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; margin-bottom: 4px;
  }
  .cal-weekday {
    text-align: center; font-size: 0.78rem; font-weight: 600;
    padding: 6px 0; color: #5f6368;
  }
  .cal-weekday.sun { color: #d93025; }
  .cal-weekday.sat { color: #1a73e8; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; background: #e8eaed; border-radius: 8px;
    overflow: hidden; padding: 2px;
  }
  .cal-cell {
    background: #fff; min-height: 76px; padding: 4px 6px;
    position: relative; display: flex; flex-direction: column;
  }
  .cal-cell.other-month { background: #f8f9fa; }
  .cal-cell.other-month .cal-date { color: #bdc1c6; }
  .cal-cell.today .cal-date {
    background: #1a73e8; color: #fff;
    width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .cal-date { font-size: 0.82rem; color: #202124; font-weight: 500; }
  .cal-cell.sun .cal-date { color: #d93025; }
  .cal-cell.sat .cal-date { color: #1a73e8; }
  .cal-cell.other-month.sun .cal-date,
  .cal-cell.other-month.sat .cal-date { color: #bdc1c6; }
  .cal-events { flex: 1; margin-top: 2px; overflow: hidden; display: flex; flex-direction: column; gap: 1px; }
  .cal-event-bar { font-size: 0.66rem; line-height: 1.2; padding: 1px 3px; border-radius: 3px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #999; }
  .cal-event-more { font-size: 0.6rem; color: #5f6368; padding: 0 3px; }
</style>
{% endblock %}

{% block content %}
<div class="cal-page">
  <div class="cal-header">
    <div class="cal-title">カレンダー</div>
    <div class="cal-nav">
      <button id="cal-prev" type="button" aria-label="前月">&lsaquo;</button>
      <button id="cal-today" class="cal-today-btn" type="button">今日</button>
      <button id="cal-next" type="button" aria-label="次月">&rsaquo;</button>
    </div>
  </div>
  <div class="cal-month-label" id="cal-month-label">読み込み中</div>
  <div class="cal-weekdays">
    <div class="cal-weekday sun">日</div>
    <div class="cal-weekday">月</div>
    <div class="cal-weekday">火</div>
    <div class="cal-weekday">水</div>
    <div class="cal-weekday">木</div>
    <div class="cal-weekday">金</div>
    <div class="cal-weekday sat">土</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<script>
  var CAL_STATE = { year: 0, month: 0 };

  function buildCell(dateNum, dow, isOther, isToday, dateKey) {
    var cls = 'cal-cell';
    if (isOther) cls += ' other-month';
    if (isToday) cls += ' today';
    if (dow === 0) cls += ' sun';
    else if (dow === 6) cls += ' sat';
    return '<div class="' + cls + '" data-date="' + (dateKey || '') + '">' +
             '<span class="cal-date">' + dateNum + '</span>' +
             '<div class="cal-events"></div>' +
           '</div>';
  }

  function renderMonthGrid() {
    var y = CAL_STATE.year;
    var m = CAL_STATE.month;
    var label = document.getElementById('cal-month-label');
    var grid = document.getElementById('cal-grid');
    if (!label || !grid) return;
    label.textContent = y + '年' + (m + 1) + '月';
    var firstDow = new Date(y, m, 1).getDay();
    var lastDate = new Date(y, m + 1, 0).getDate();
    var prevLast = new Date(y, m, 0).getDate();
    var today = new Date();
    var tY = today.getFullYear(), tM = today.getMonth(), tD = today.getDate();
    var html = '', cells = 0;
    for (var i = firstDow; i > 0; i--) {
      var d = prevLast - i + 1;
      var dow = (7 - i + firstDow) % 7;
      var prevY = m === 0 ? y - 1 : y; var prevM = m === 0 ? 11 : m - 1; var prevKey = prevY + '-' + (prevM + 1 < 10 ? '0' : '') + (prevM + 1) + '-' + (d < 10 ? '0' : '') + d; html += buildCell(d, dow, true, false, prevKey);
      cells++;
    }
    for (var d2 = 1; d2 <= lastDate; d2++) {
      var dow2 = new Date(y, m, d2).getDay();
      var isToday = (y === tY && m === tM && d2 === tD);
      var curKey = y + '-' + (m + 1 < 10 ? '0' : '') + (m + 1) + '-' + (d2 < 10 ? '0' : '') + d2; html += buildCell(d2, dow2, false, isToday, curKey);
      cells++;
    }
    var nextD = 1;
    while (cells < 42) {
      var nextY = m === 11 ? y + 1 : y; var nextM = m === 11 ? 0 : m + 1; var nextKey = nextY + '-' + (nextM + 1 < 10 ? '0' : '') + (nextM + 1) + '-' + (nextD < 10 ? '0' : '') + nextD; html += buildCell(nextD, cells % 7, true, false, nextKey);
      cells++;
      nextD++;
    }
    grid.innerHTML = html; loadEvents();
  }

  function calInit() {
    var now = new Date();
    CAL_STATE.year = now.getFullYear();
    CAL_STATE.month = now.getMonth();
    renderMonthGrid();
    var p = document.getElementById('cal-prev');
    var n = document.getElementById('cal-next');
    var t = document.getElementById('cal-today');
    if (p) p.onclick = function () {
      CAL_STATE.month--;
      if (CAL_STATE.month < 0) { CAL_STATE.month = 11; CAL_STATE.year--; }
      renderMonthGrid();
    };
    if (n) n.onclick = function () {
      CAL_STATE.month++;
      if (CAL_STATE.month > 11) { CAL_STATE.month = 0; CAL_STATE.year++; }
      renderMonthGrid();
    };
    if (t) t.onclick = function () {
      var x = new Date();
      CAL_STATE.year = x.getFullYear();
      CAL_STATE.month = x.getMonth();
      renderMonthGrid();
    };
  }
  function loadEvents() {
    CAL_STATE.reqSeq = (CAL_STATE.reqSeq || 0) + 1;
    var mySeq = CAL_STATE.reqSeq;
    // Clear any stale bars up-front (idempotent re-render guard)
    var slots0 = document.querySelectorAll('#cal-grid .cal-events');
    for (var i0 = 0; i0 < slots0.length; i0++) { slots0[i0].innerHTML = ''; }
    var y = CAL_STATE.year;
    var m = CAL_STATE.month;
    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    var firstDow = new Date(y, m, 1).getDay();
    var fromDate = new Date(y, m, 1 - firstDow);
    var toDate = new Date(fromDate);
    toDate.setDate(toDate.getDate() + 41);
    var from = fromDate.getFullYear() + '-' + pad2(fromDate.getMonth() + 1) + '-' + pad2(fromDate.getDate());
    var to   = toDate.getFullYear() + '-' + pad2(toDate.getMonth() + 1) + '-' + pad2(toDate.getDate());
    fetch('/api/calendar_events?from=' + from + '&to=' + to, { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (mySeq !== CAL_STATE.reqSeq) { return; }
        var events = (data && data.events) || [];
        var map = {};
        events.forEach(function (ev) {
          var d = ev.event_date;
          if (!d) return;
          if (!map[d]) map[d] = [];
          map[d].push(ev);
        });
        Object.keys(map).forEach(function (dateStr) {
          var cell = document.querySelector('.cal-cell[data-date="' + dateStr + '"]');
          if (!cell) return;
          var slot = cell.querySelector('.cal-events');
          if (!slot) return;
          var evs = map[dateStr];
          var MAX = 3;
          evs.slice(0, MAX).forEach(function (ev) {
            var bar = document.createElement('div');
            bar.className = 'cal-event-bar';
            if (ev.color) bar.style.background = ev.color;
            var prefix = '';
            if (ev.sticker) prefix = ev.sticker + ' ';
            else if (!ev.all_day && ev.start_time) prefix = ev.start_time.slice(0, 5) + ' ';
            bar.textContent = prefix + (ev.title || '');
            bar.title = (ev.title || '') + (ev.memo ? ' - ' + ev.memo : '');
            slot.appendChild(bar);
          });
          if (evs.length > MAX) {
            var more = document.createElement('div');
            more.className = 'cal-event-more';
            more.textContent = '+' + (evs.length - MAX);
            slot.appendChild(more);
          }
        });
      })
      .catch(function (e) { console.warn('loadEvents error:', e); });
  }

  calInit();
</script>
{% endblock %}
