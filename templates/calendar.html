{% extends "base.html" %}
{% block title %}カレンダー - TASUKARU{% endblock %}
{% block nav_calendar %}active{% endblock %}

{% block extra_style %}
<style>
  /* Calendar view fills the whole screen width and height */
  body { max-width: none !important; }
  .cal-page.cal-page--full {
    max-width: none;
    padding: 8px 4px max(84px, calc(env(safe-area-inset-bottom) + 60px));
    margin: 0;
  }
  .cal-page {
    max-width: 680px;
    margin: 0 auto;
    padding: 8px 12px 120px;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 4px 8px;
  }
  .cal-title { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; }
  .cal-nav { display: flex; align-items: center; gap: 8px; }
  .cal-nav button {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1px solid #dde1e6; background: #fff; color: #1a73e8;
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav button:hover { background: #f1f6ff; }
  .cal-nav .cal-today-btn {
    width: auto; padding: 0 14px; border-radius: 18px;
    font-size: 0.88rem; font-weight: 600;
  }
  .cal-month-label {
    font-size: 1.15rem; font-weight: 700; color: #1a1a1a;
    text-align: center; margin: 4px 0 12px;
  }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px; margin-bottom: 4px;
  }
  .cal-weekday {
    text-align: center; font-size: 0.78rem; font-weight: 600;
    padding: 6px 0; color: #5f6368; font-size: 0.85rem; font-weight: 600;
  }
  .cal-weekday.sun { color: #d93025; }
  .cal-weekday.sat { color: #1a73e8; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 1px; background: #dadce0; border-radius: 0;
    overflow: hidden; padding: 0;
    height: calc(100dvh - 220px);
    min-height: 440px;
  }
  .cal-cell {
    background: #fff; min-height: 0; padding: 4px 6px;
    position: relative; display: flex; flex-direction: column;
    overflow: hidden;
  }
  .cal-cell.other-month { background: #f8f9fa; }
  .cal-cell.other-month .cal-date { color: #bdc1c6; }
  .cal-cell.today .cal-date {
    background: #1a73e8; color: #fff;
    width: 24px; height: 24px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .cal-date { font-size: 0.95rem; color: #202124; font-weight: 600; }
  .cal-cell.sun .cal-date { color: #d93025; }
  .cal-cell.sat .cal-date { color: #1a73e8; }
  .cal-cell.other-month.sun .cal-date,
  .cal-cell.other-month.sat .cal-date { color: #bdc1c6; }
  .cal-events { flex: 1; margin-top: 2px; overflow: hidden; display: flex; flex-direction: column; gap: 1px; }
  .cal-event-bar { font-size: 0.82rem; line-height: 1.35; padding: 3px 6px; border-radius: 5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: #999; font-weight: 500; }
  .cal-event-more { font-size: 0.72rem; color: #5f6368; padding: 0 4px; font-weight: 600; }
  /* ===== Step 2a: day-detail modal ===== */
  .cal-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 16px; padding-bottom: max(110px, calc(env(safe-area-inset-bottom) + 90px)); padding-top: max(20px, env(safe-area-inset-top)); box-sizing: border-box; }
  .cal-modal-backdrop[hidden] { display: none !important; }
  .cal-modal { background: #fff; width: 100%; max-width: 480px; max-height: 100%; border-radius: 12px; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.2); overflow: hidden; animation: cal-modal-in 0.18s ease-out; }
  @media (min-width: 640px) { .cal-modal-backdrop { padding-bottom: 16px; padding-top: 16px; } }
  @keyframes cal-modal-in { from { transform: translateY(16px); opacity: 0; } to { transform: none; opacity: 1; } }
  .cal-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #eee; }
  .cal-modal-title { font-size: 1rem; font-weight: 600; color: #202124; }
  .cal-modal-close { background: none; border: none; font-size: 1.6rem; line-height: 1; color: #5f6368; cursor: pointer; padding: 0 6px; }
  .cal-modal-close:hover { color: #202124; }
  .cal-modal-body { padding: 8px 0; overflow-y: auto; flex: 1; }
  .cal-modal-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f5f5f5; }
  .cal-modal-item:last-child { border-bottom: none; }
  .cal-modal-item-bar { width: 4px; flex-shrink: 0; align-self: stretch; border-radius: 2px; background: #ccc; }
  .cal-modal-item-main { flex: 1; min-width: 0; }
  .cal-modal-item-time { font-size: 0.8rem; color: #5f6368; margin-bottom: 2px; }
  .cal-modal-item-title { font-size: 0.95rem; color: #202124; font-weight: 500; word-break: break-word; }
  .cal-modal-item-memo { font-size: 0.82rem; color: #5f6368; margin-top: 4px; word-break: break-word; }
  .cal-modal-empty { padding: 32px 16px; text-align: center; color: #9aa0a6; font-size: 0.9rem; }
  /* ===== Step 2b-1: create-mode form + footer ===== */
  .cal-modal-add { background: none; border: none; color: #1a73e8; font-size: 1.5rem; font-weight: 600; cursor: pointer; padding: 0 10px; line-height: 1; }
  .cal-modal-add:hover { color: #0d47a1; }
  .cal-modal-header-actions { display: flex; align-items: center; gap: 4px; }
  .cal-modal-form { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
  .cal-modal-field-label { font-size: 0.82rem; color: #5f6368; margin-bottom: 4px; }
  .cal-modal-input, .cal-modal-textarea { width: 100%; font-size: 0.95rem; color: #202124; padding: 9px 10px; border: 1px solid #dadce0; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
  .cal-modal-input:focus, .cal-modal-textarea:focus { border-color: #1a73e8; outline: none; }
  .cal-modal-textarea { resize: vertical; min-height: 72px; }
  .cal-modal-error { color: #d93025; font-size: 0.82rem; padding: 0 16px 4px; }
  .cal-modal-error[hidden] { display: none !important; }
  .cal-modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 10px 16px; border-top: 1px solid #eee; }
  .cal-modal-footer[hidden] { display: none !important; }
  .cal-modal-btn { font-size: 0.9rem; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .cal-modal-btn-secondary { background: #fff; color: #5f6368; border: 1px solid #dadce0; }
  .cal-modal-btn-secondary:hover { background: #f8f9fa; }
  .cal-modal-btn-primary { background: #1a73e8; color: #fff; border: 1px solid #1a73e8; }
  .cal-modal-btn-primary:hover { background: #174ea6; }
  .cal-modal-btn-primary:disabled { background: #c8c8c8; border-color: #c8c8c8; cursor: not-allowed; }
</style>
{% endblock %}

{% block content %}
<div class="cal-page cal-page--full">
  <div class="cal-header">
    <div class="cal-title">カレンダー</div>
    <div class="cal-nav">
      <button id="cal-prev" type="button" aria-label="前月">&lsaquo;</button>
      <button id="cal-today" class="cal-today-btn" type="button">今日</button>
      <button id="cal-next" type="button" aria-label="次月">&rsaquo;</button>
    </div>
  </div>
  <div class="cal-month-label" id="cal-month-label">読み込み中</div>
  <div class="cal-weekdays">
    <div class="cal-weekday sun">日</div>
    <div class="cal-weekday">月</div>
    <div class="cal-weekday">火</div>
    <div class="cal-weekday">水</div>
    <div class="cal-weekday">木</div>
    <div class="cal-weekday">金</div>
    <div class="cal-weekday sat">土</div>
  </div>
  <div class="cal-grid" id="cal-grid" data-default-calendar-id="{{ calendars[0].id if calendars else '' }}"></div>

  <div id="cal-modal-backdrop" class="cal-modal-backdrop" hidden>
    <div class="cal-modal" role="dialog" aria-modal="true" aria-labelledby="cal-modal-title">
      <div class="cal-modal-header">
        <span id="cal-modal-title" class="cal-modal-title"></span>
        <div class="cal-modal-header-actions">
          <button type="button" id="cal-modal-add" class="cal-modal-add" aria-label="予定を追加" title="予定を追加">+</button>
          <button type="button" id="cal-modal-close" class="cal-modal-close" aria-label="閉じる">×</button>
        </div>
      </div>
      <div id="cal-modal-body" class="cal-modal-body"></div>
      <div id="cal-modal-error" class="cal-modal-error" hidden></div>
      <div id="cal-modal-footer" class="cal-modal-footer" hidden>
        <button type="button" id="cal-modal-cancel" class="cal-modal-btn cal-modal-btn-secondary">キャンセル</button>
        <button type="button" id="cal-modal-save" class="cal-modal-btn cal-modal-btn-primary">保存</button>
      </div>
    </div>
  </div>
</div>

<script>
  var CAL_STATE = { year: 0, month: 0 };

  function buildCell(dateNum, dow, isOther, isToday, dateKey) {
    var cls = 'cal-cell';
    if (isOther) cls += ' other-month';
    if (isToday) cls += ' today';
    if (dow === 0) cls += ' sun';
    else if (dow === 6) cls += ' sat';
    return '<div class="' + cls + '" data-date="' + (dateKey || '') + '">' +
             '<span class="cal-date">' + dateNum + '</span>' +
             '<div class="cal-events"></div>' +
           '</div>';
  }

  function renderMonthGrid() {
    var y = CAL_STATE.year;
    var m = CAL_STATE.month;
    var label = document.getElementById('cal-month-label');
    var grid = document.getElementById('cal-grid');
    if (!label || !grid) return;
    label.textContent = y + '年' + (m + 1) + '月';
    var firstDow = new Date(y, m, 1).getDay();
    var lastDate = new Date(y, m + 1, 0).getDate();
    var prevLast = new Date(y, m, 0).getDate();
    var today = new Date();
    var tY = today.getFullYear(), tM = today.getMonth(), tD = today.getDate();
    var html = '', cells = 0;
    for (var i = firstDow; i > 0; i--) {
      var d = prevLast - i + 1;
      var dow = (7 - i + firstDow) % 7;
      var prevY = m === 0 ? y - 1 : y; var prevM = m === 0 ? 11 : m - 1; var prevKey = prevY + '-' + (prevM + 1 < 10 ? '0' : '') + (prevM + 1) + '-' + (d < 10 ? '0' : '') + d; html += buildCell(d, dow, true, false, prevKey);
      cells++;
    }
    for (var d2 = 1; d2 <= lastDate; d2++) {
      var dow2 = new Date(y, m, d2).getDay();
      var isToday = (y === tY && m === tM && d2 === tD);
      var curKey = y + '-' + (m + 1 < 10 ? '0' : '') + (m + 1) + '-' + (d2 < 10 ? '0' : '') + d2; html += buildCell(d2, dow2, false, isToday, curKey);
      cells++;
    }
    var nextD = 1;
    while (cells < 42) {
      var nextY = m === 11 ? y + 1 : y; var nextM = m === 11 ? 0 : m + 1; var nextKey = nextY + '-' + (nextM + 1 < 10 ? '0' : '') + (nextM + 1) + '-' + (nextD < 10 ? '0' : '') + nextD; html += buildCell(nextD, cells % 7, true, false, nextKey);
      cells++;
      nextD++;
    }
    grid.innerHTML = html; loadEvents(); attachCellHandlers();
  }

  function calInit() {
    var now = new Date();
    CAL_STATE.year = now.getFullYear();
    CAL_STATE.month = now.getMonth();
    renderMonthGrid();
    var p = document.getElementById('cal-prev');
    var n = document.getElementById('cal-next');
    var t = document.getElementById('cal-today');
    if (p) p.onclick = function () {
      CAL_STATE.month--;
      if (CAL_STATE.month < 0) { CAL_STATE.month = 11; CAL_STATE.year--; }
      renderMonthGrid();
    };
    if (n) n.onclick = function () {
      CAL_STATE.month++;
      if (CAL_STATE.month > 11) { CAL_STATE.month = 0; CAL_STATE.year++; }
      renderMonthGrid();
    };
    if (t) t.onclick = function () {
      var x = new Date();
      CAL_STATE.year = x.getFullYear();
      CAL_STATE.month = x.getMonth();
      renderMonthGrid();
    };
  }
  function loadEvents() {
    CAL_STATE.reqSeq = (CAL_STATE.reqSeq || 0) + 1;
    var mySeq = CAL_STATE.reqSeq;
    // Clear any stale bars up-front (idempotent re-render guard)
    var slots0 = document.querySelectorAll('#cal-grid .cal-events');
    for (var i0 = 0; i0 < slots0.length; i0++) { slots0[i0].innerHTML = ''; }
    var y = CAL_STATE.year;
    var m = CAL_STATE.month;
    function pad2(n) { return (n < 10 ? '0' : '') + n; }
    var firstDow = new Date(y, m, 1).getDay();
    var fromDate = new Date(y, m, 1 - firstDow);
    var toDate = new Date(fromDate);
    toDate.setDate(toDate.getDate() + 41);
    var from = fromDate.getFullYear() + '-' + pad2(fromDate.getMonth() + 1) + '-' + pad2(fromDate.getDate());
    var to   = toDate.getFullYear() + '-' + pad2(toDate.getMonth() + 1) + '-' + pad2(toDate.getDate());
    fetch('/api/calendar_events?from=' + from + '&to=' + to, { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (mySeq !== CAL_STATE.reqSeq) { return; }
        var events = (data && data.events) || [];
        var map = {};
        events.forEach(function (ev) {
          var d = ev.event_date;
          if (!d) return;
          if (!map[d]) map[d] = [];
          map[d].push(ev);
        });
        CAL_STATE.eventsByDate = map;
        Object.keys(map).forEach(function (dateStr) {
          var cell = document.querySelector('.cal-cell[data-date="' + dateStr + '"]');
          if (!cell) return;
          var slot = cell.querySelector('.cal-events');
          if (!slot) return;
          var evs = map[dateStr];
          var MAX = 3;
          evs.slice(0, MAX).forEach(function (ev) {
            var bar = document.createElement('div');
            bar.className = 'cal-event-bar';
            if (ev.color) bar.style.background = ev.color;
            var prefix = '';
            if (ev.sticker) prefix = ev.sticker + ' ';
            else if (!ev.all_day && ev.start_time) prefix = ev.start_time.slice(0, 5) + ' ';
            bar.textContent = prefix + (ev.title || '');
            bar.title = (ev.title || '') + (ev.memo ? ' - ' + ev.memo : '');
            slot.appendChild(bar);
          });
          if (evs.length > MAX) {
            var more = document.createElement('div');
            more.className = 'cal-event-more';
            more.textContent = '+' + (evs.length - MAX);
            slot.appendChild(more);
          }
        });
      })
      .catch(function (e) { console.warn('loadEvents error:', e); });
  }

  function formatModalDate(dateStr) {
    // dateStr: YYYY-MM-DD
    var parts = dateStr.split("-");
    var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
    var dow = new Date(y, m - 1, d).getDay();
    var yobi = ['日','月','火','水','木','金','土'];
    return y + '年' + m + '月' + d + '日' + ' (' + yobi[dow] + ')';
  }
  function openDayModal(dateStr) {
    var titleEl = document.getElementById("cal-modal-title");
    var bodyEl = document.getElementById("cal-modal-body");
    var backdrop = document.getElementById("cal-modal-backdrop");
    if (!titleEl || !bodyEl || !backdrop) return;
    CAL_STATE.modalDate = dateStr;
    CAL_STATE.modalMode = "detail";
    var footerEl = document.getElementById("cal-modal-footer");
    var errorEl = document.getElementById("cal-modal-error");
    if (footerEl) footerEl.hidden = true;
    if (errorEl) { errorEl.hidden = true; errorEl.textContent = ""; }
    titleEl.textContent = formatModalDate(dateStr);
    bodyEl.innerHTML = "";
    var evs = (CAL_STATE.eventsByDate && CAL_STATE.eventsByDate[dateStr]) || [];
    if (evs.length === 0) {
      var empty = document.createElement("div");
      empty.className = "cal-modal-empty";
      empty.textContent = '予定なし';
      bodyEl.appendChild(empty);
    } else {
      evs.forEach(function (ev) {
        var item = document.createElement("div");
        item.className = "cal-modal-item";
        var bar = document.createElement("div");
        bar.className = "cal-modal-item-bar";
        if (ev.color) bar.style.background = ev.color;
        item.appendChild(bar);
        var main = document.createElement("div");
        main.className = "cal-modal-item-main";
        var timeStr = "";
        if (!ev.all_day && ev.start_time) {
          timeStr = String(ev.start_time).slice(0, 5);
          if (ev.end_time) timeStr += " - " + String(ev.end_time).slice(0, 5);
        }
        if (timeStr) {
          var t = document.createElement("div");
          t.className = "cal-modal-item-time";
          t.textContent = timeStr;
          main.appendChild(t);
        }
        var title = document.createElement("div");
        title.className = "cal-modal-item-title";
        title.textContent = (ev.sticker ? ev.sticker + " " : "") + (ev.title || "");
        main.appendChild(title);
        if (ev.memo) {
          var memo = document.createElement("div");
          memo.className = "cal-modal-item-memo";
          memo.textContent = ev.memo;
          main.appendChild(memo);
        }
        item.appendChild(main);
        bodyEl.appendChild(item);
      });
    }
    backdrop.hidden = false;
  }
  function closeDayModal() {
    var backdrop = document.getElementById("cal-modal-backdrop");
    if (backdrop) backdrop.hidden = true;
  }
  function attachCellHandlers() {
    var cells = document.querySelectorAll("#cal-grid .cal-cell[data-date]");
    for (var i = 0; i < cells.length; i++) {
      (function (cell) {
        cell.addEventListener("click", function () {
          var d = cell.getAttribute("data-date");
          if (d) openDayModal(d);
        });
      })(cells[i]);
    }
  }
  function getDefaultCalendarId() {
    var g = document.getElementById("cal-grid");
    return g ? (g.getAttribute("data-default-calendar-id") || "") : "";
  }
  function switchToCreateMode(dateStr) {
    CAL_STATE.modalMode = "create";
    CAL_STATE.modalDate = dateStr;
    var body = document.getElementById("cal-modal-body");
    var footer = document.getElementById("cal-modal-footer");
    var err = document.getElementById("cal-modal-error");
    var titleEl = document.getElementById("cal-modal-title");
    if (!body || !footer) return;
    if (titleEl) titleEl.textContent = formatModalDate(dateStr);
    body.innerHTML = "";
    var form = document.createElement("div");
    form.className = "cal-modal-form";
    var l1 = document.createElement("label");
    l1.className = "cal-modal-field-label";
    l1.textContent = "タイトル";
    form.appendChild(l1);
    var inp = document.createElement("input");
    inp.type = "text"; inp.id = "cal-form-title"; inp.className = "cal-modal-input"; inp.maxLength = 100;
    inp.placeholder = "タイトル";
    form.appendChild(inp);
    var l2 = document.createElement("label");
    l2.className = "cal-modal-field-label";
    l2.textContent = "メモ";
    form.appendChild(l2);
    var ta = document.createElement("textarea");
    ta.id = "cal-form-memo"; ta.className = "cal-modal-textarea"; ta.maxLength = 1000;
    ta.placeholder = "メモ";
    form.appendChild(ta);
    body.appendChild(form);
    if (err) { err.hidden = true; err.textContent = ""; }
    footer.hidden = false;
    var saveBtn = document.getElementById("cal-modal-save");
    if (saveBtn) saveBtn.disabled = false;
    setTimeout(function(){ var i = document.getElementById("cal-form-title"); if (i) i.focus(); }, 50);
  }
  function switchToDetailMode(dateStr) {
    openDayModal(dateStr);
  }
  function createEvent(dateStr) {
    var titleInput = document.getElementById("cal-form-title");
    var memoInput = document.getElementById("cal-form-memo");
    var saveBtn = document.getElementById("cal-modal-save");
    var errEl = document.getElementById("cal-modal-error");
    if (!titleInput || !errEl) return;
    var title = (titleInput.value || "").trim();
    if (!title) { errEl.textContent = "タイトルを入力してください"; errEl.hidden = false; return; }
    var calId = getDefaultCalendarId();
    if (!calId) { errEl.textContent = "カレンダーが見つかりません"; errEl.hidden = false; return; }
    errEl.hidden = true; errEl.textContent = "";
    if (saveBtn) saveBtn.disabled = true;
    var payload = { calendar_id: calId, title: title, event_date: dateStr, all_day: true, color: "#1a73e8", memo: (memoInput ? memoInput.value : "") };
    fetch("/api/save_calendar_event", {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Requested-With": "XMLHttpRequest" },
      body: JSON.stringify(payload)
    }).then(function(r){ return r.json(); })
      .then(function(d){
        if (d && d.status === "success") {
          loadEvents();
          setTimeout(function(){ switchToDetailMode(dateStr); }, 300);
        } else {
          errEl.textContent = (d && d.message) ? d.message : "保存に失敗しました";
          errEl.hidden = false;
          if (saveBtn) saveBtn.disabled = false;
        }
      })
      .catch(function(e){
        errEl.textContent = "通信エラー: " + (e && e.message ? e.message : e);
        errEl.hidden = false;
        if (saveBtn) saveBtn.disabled = false;
      });
  }
  function wireModalChrome() {
    var closeBtn = document.getElementById("cal-modal-close");
    if (closeBtn) closeBtn.addEventListener("click", closeDayModal);
    var backdrop = document.getElementById("cal-modal-backdrop");
    if (backdrop) {
      backdrop.addEventListener("click", function (e) {
        if (e.target === backdrop) closeDayModal();
      });
    }
    var addBtn = document.getElementById("cal-modal-add");
    if (addBtn) addBtn.addEventListener("click", function () {
      if (CAL_STATE.modalDate) switchToCreateMode(CAL_STATE.modalDate);
    });
    var cancelBtn = document.getElementById("cal-modal-cancel");
    if (cancelBtn) cancelBtn.addEventListener("click", function () {
      if (CAL_STATE.modalDate) switchToDetailMode(CAL_STATE.modalDate);
    });
    var saveBtn = document.getElementById("cal-modal-save");
    if (saveBtn) saveBtn.addEventListener("click", function () {
      if (CAL_STATE.modalDate) createEvent(CAL_STATE.modalDate);
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closeDayModal();
    });
  }
  wireModalChrome();
  calInit();
</script>
{% endblock %}
