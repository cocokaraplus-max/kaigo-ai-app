<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新しいパスワードを設定 - TASUKARU</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: linear-gradient(135deg, #e8f0fe, #f3e5f5); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 32px 24px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo img { width: 80px; }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: #1a73e8; margin-top: 8px; }
        .card-title { text-align: center; font-size: 1.1rem; font-weight: 700; color: #202124; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { display: flex; align-items: center; gap: 5px; font-size: 0.82rem; font-weight: 600; color: #5f6368; margin-bottom: 6px; }
        .material-symbols-outlined { font-size: 18px; vertical-align: middle; }
        .form-control { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1.5px solid #E0E0E0; font-size: 1rem; color: #202124; -webkit-appearance: none; }
        .form-control:focus { outline: none; border-color: #1a73e8; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: #1a73e8; color: white; font-size: 1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .alert { padding: 12px 14px; border-radius: 10px; font-size: 0.88rem; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 8px; }
        .alert-error { background: #fce8e6; color: #c5221f; }
        .alert-success { background: #e6f4ea; color: #1e7e34; }
        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { font-size: 0.82rem; color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="TASUKARU" onerror="this.style.display='none'">
            <div class="logo-text">TASUKARU</div>
        </div>

        {% if expired %}
        <div class="alert alert-error">
            <span class="material-symbols-outlined">error</span>
            このリンクは無効または期限切れです。再度パスワードリセットを行ってください。
        </div>
        {% elif success %}
        <div class="alert alert-success">
            <span class="material-symbols-outlined">check_circle</span>
            パスワードを更新しました！ログイン画面からサインインしてください。
        </div>
        {% else %}
        <div class="card-title">新しいパスワードを設定</div>

        {% if error %}
        <div class="alert alert-error">
            <span class="material-symbols-outlined">error</span>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">lock</span>
                    新しいパスワード
                </label>
                <div style="position:relative;">
                    <input type="password" name="password" class="form-control" id="pw1" placeholder="4文字以上" required style="padding-right:44px;">
                    <span onclick="togglePw('pw1','eye1')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#80868b;">
                        <span class="material-symbols-outlined" id="eye1" style="font-size:20px;">visibility</span>
                    </span>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">
                    <span class="material-symbols-outlined">lock_reset</span>
                    パスワード確認
                </label>
                <div style="position:relative;">
                    <input type="password" name="password2" class="form-control" id="pw2" placeholder="もう一度入力" required style="padding-right:44px;">
                    <span onclick="togglePw('pw2','eye2')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:#80868b;">
                        <span class="material-symbols-outlined" id="eye2" style="font-size:20px;">visibility</span>
                    </span>
                </div>
            </div>
            <button type="submit" class="btn">
                <span class="material-symbols-outlined">check</span>
                パスワードを更新
            </button>
        </form>
        {% endif %}

        <div class="back-link">
            <a href="/login">← ログイン画面に戻る</a>
        </div>
    </div>
<script>
function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility_off';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility';
    }
}
</script>
</body>
</html>
