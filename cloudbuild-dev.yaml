# Cloud Build config for dev environment auto-deploy
# Triggered by pushes to tasukaru-dev branch
# Deploys to Cloud Run service: tasukaru-dev
# IMPORTANT: Does NOT modify env vars (SUPABASE_URL/KEY etc preserved)

steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tasukaru-dev:$SHORT_SHA'
      - '.'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tasukaru-dev:$SHORT_SHA'

  # Deploy to Cloud Run - only updating image, preserving env vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'tasukaru-dev'
      - '--region=asia-northeast1'
      - '--image=asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tasukaru-dev:$SHORT_SHA'
      - '--quiet'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/tasukaru-dev:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
